<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>kotone</title>
</head>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #222;
    --muted: #666;
    --border: #e6e6ea;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
  }

  .wrap {
    max-width: 980px;
    margin: 56px auto;
    padding: 0 18px;
  }

  .title-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.app-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}
  
  header {
    text-align: center;
    padding: 28px 0 10px;
  }

  h1 {
    margin: 0 0 8px 0;
    font-size: 34px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
  }

  .section {
    margin: 26px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  /* 🔹 画像の基本設定（常に必要） */
  .feature img {
    width: 300px;
    max-width: 100%;
    height: auto;
    border-radius: 16px;
    border: 1px solid #ddd;
    display: block;
  }

  .feature h2 {
    margin: 0 0 10px 0;
  }

  .feature p {
    margin: 0;
    color: var(--muted);
  }

  footer {
    text-align: center;
    margin: 42px 0 18px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title-wrap">
        <img src="image/kotohane_icon_1024(dark gray).png" alt="App Icon" class="app-icon">
        <h1>kotone</h1>
      </div>
      <p>四声トレーニングアプリ</p>
    </header>

    <!-- 1: 四声 -->
    <section class="section">
        <div class="feature">
          <h2>四声の練習画面</h2>
          <img src="image/fig1.png" alt="sisheng practice screenshot" style="width: 100%; height: auto;">
          <p>
            グラフを見ながら声調の練習ができます。
          </p>
      </div>
    </section>

    <!-- 2: Entry Clothes Data -->
    <section class="section">
        <div class="feature">
          <h2>Entry Clothes Data</h2>
            <iframe width="300" height="533" src="" frameborder="0" allowfullscreen>
            </iframe>
          <p>
            
          </p>
      </div>
    </section>

    <!-- How to Use -->
    <section class="section howto">
      <h2 style="margin:2px 0 6px 0;">アプリの使い方</h2>
      <ol>
        <li><b>１音練習</b>ma の音で四声の練習をします</li>
        <li><b>２音練習</b>発音しやすい単語で、四声の２音の練習をします。</li>
      </ol>
    </section>

    <footer>© 2026 eigomStudio</footer>
  </div>
</body>
</html>

</html>
